###############################################################################
# Muzayede Platform — Local Development Docker Compose
# Usage: docker compose up -d
###############################################################################

version: "3.9"

x-common: &common
  restart: unless-stopped
  networks:
    - muzayede-net

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    <<: *common
    image: postgres:16-alpine
    container_name: muzayede-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: muzayede_dev
      POSTGRES_USER: muzayede
      POSTGRES_PASSWORD: muzayede_dev_2026
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U muzayede -d muzayede_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    <<: *common
    image: redis:7-alpine
    container_name: muzayede-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
        --appendonly yes
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Zookeeper (required by Kafka)
  # ---------------------------------------------------------------------------
  zookeeper:
    <<: *common
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: muzayede-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep Mode"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Apache Kafka
  # ---------------------------------------------------------------------------
  kafka:
    <<: *common
    image: confluentinc/cp-kafka:7.6.0
    container_name: muzayede-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Elasticsearch 8 (single-node, security disabled for dev)
  # ---------------------------------------------------------------------------
  elasticsearch:
    <<: *common
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: muzayede-elasticsearch
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - cluster.name=muzayede-dev
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # MongoDB 7
  # ---------------------------------------------------------------------------
  mongodb:
    <<: *common
    image: mongo:7.0
    container_name: muzayede-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: muzayede
      MONGO_INITDB_ROOT_PASSWORD: muzayede_dev_2026
      MONGO_INITDB_DATABASE: muzayede_dev
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # MinIO (S3-compatible object storage)
  # ---------------------------------------------------------------------------
  minio:
    <<: *common
    image: minio/minio:latest
    container_name: muzayede-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    environment:
      MINIO_ROOT_USER: muzayede_minio
      MINIO_ROOT_PASSWORD: muzayede_minio_2026
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Kibana (optional — Elasticsearch visualization)
  # ---------------------------------------------------------------------------
  kibana:
    <<: *common
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: muzayede-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: '["http://elasticsearch:9200"]'
      XPACK_SECURITY_ENABLED: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:5601/api/status | grep -q 'available'"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    profiles:
      - monitoring

  # ---------------------------------------------------------------------------
  # Kafka UI (optional — Kafka monitoring)
  # ---------------------------------------------------------------------------
  kafka-ui:
    <<: *common
    image: provectuslabs/kafka-ui:latest
    container_name: muzayede-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: muzayede-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      DYNAMIC_CONFIG_ENABLED: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    profiles:
      - monitoring

# =============================================================================
# Named volumes
# =============================================================================
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  zookeeper-data:
    driver: local
  zookeeper-logs:
    driver: local
  kafka-data:
    driver: local
  elasticsearch-data:
    driver: local
  mongodb-data:
    driver: local
  minio-data:
    driver: local

# =============================================================================
# Shared network
# =============================================================================
networks:
  muzayede-net:
    driver: bridge
    name: muzayede-net
