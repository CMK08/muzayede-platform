###############################################################################
# Production Namespace
###############################################################################
apiVersion: v1
kind: Namespace
metadata:
  name: muzayede-production
  labels:
    app.kubernetes.io/part-of: muzayede-platform
    environment: production
    team: platform
  annotations:
    description: "Muzayede auction platform - production environment"
---
###############################################################################
# Resource Quota — production
###############################################################################
apiVersion: v1
kind: ResourceQuota
metadata:
  name: production-quota
  namespace: muzayede-production
  labels:
    app.kubernetes.io/part-of: muzayede-platform
    environment: production
spec:
  hard:
    # Pod limits
    pods: "120"
    # CPU limits
    requests.cpu: "32"
    limits.cpu: "64"
    # Memory limits
    requests.memory: "64Gi"
    limits.memory: "128Gi"
    # PVC limits
    persistentvolumeclaims: "30"
    requests.storage: "500Gi"
    # Service / config limits
    services: "30"
    configmaps: "60"
    secrets: "60"
    services.loadbalancers: "5"
    services.nodeports: "10"
---
###############################################################################
# Limit Range — default resource limits per container
###############################################################################
apiVersion: v1
kind: LimitRange
metadata:
  name: production-limit-range
  namespace: muzayede-production
  labels:
    app.kubernetes.io/part-of: muzayede-platform
    environment: production
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "4"
        memory: "8Gi"
      min:
        cpu: "50m"
        memory: "64Mi"
    - type: Pod
      max:
        cpu: "8"
        memory: "16Gi"
---
###############################################################################
# Network Policy — deny all ingress by default, allow within namespace
###############################################################################
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: muzayede-production
  labels:
    app.kubernetes.io/part-of: muzayede-platform
    environment: production
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: muzayede-production
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
