###############################################################################
# Monitoring Namespace — Prometheus, Grafana, Alertmanager
###############################################################################
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    app.kubernetes.io/part-of: muzayede-platform
    environment: shared
    purpose: monitoring
    team: platform
  annotations:
    description: "Monitoring stack for Muzayede platform (Prometheus, Grafana, Alertmanager)"
---
###############################################################################
# Resource Quota — monitoring
###############################################################################
apiVersion: v1
kind: ResourceQuota
metadata:
  name: monitoring-quota
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: muzayede-platform
    purpose: monitoring
spec:
  hard:
    pods: "30"
    requests.cpu: "8"
    limits.cpu: "16"
    requests.memory: "16Gi"
    limits.memory: "32Gi"
    persistentvolumeclaims: "10"
    requests.storage: "200Gi"
    services: "15"
    configmaps: "30"
    secrets: "30"
    services.loadbalancers: "2"
---
###############################################################################
# Limit Range — default resource limits per container
###############################################################################
apiVersion: v1
kind: LimitRange
metadata:
  name: monitoring-limit-range
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: muzayede-platform
    purpose: monitoring
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "4"
        memory: "8Gi"
      min:
        cpu: "50m"
        memory: "64Mi"
---
###############################################################################
# Network Policy — allow scraping from monitoring namespace into app namespaces
###############################################################################
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: muzayede-platform
    purpose: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              environment: production
    - to:
        - namespaceSelector:
            matchLabels:
              environment: staging
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
