{{/*
Shared Secrets - placeholder Secret for infrastructure credentials.

In production, replace this with:
  - External Secrets Operator (AWS Secrets Manager / Vault)
  - Sealed Secrets
  - SOPS-encrypted values

The values below are base64 placeholders ("CHANGE_ME") and MUST be overridden
before deploying to any real environment.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: muzayede-shared-secrets
  namespace: {{ include "muzayede.namespace" . }}
  labels:
    {{- include "muzayede.labels" (dict "name" "shared-secrets" "context" $) | nindent 4 }}
type: Opaque
data:
  # -------------------------------------------------------------------------
  # PostgreSQL
  # -------------------------------------------------------------------------
  DATABASE_USERNAME: Q0hBTkdFX01F                    # CHANGE_ME
  DATABASE_PASSWORD: Q0hBTkdFX01F                    # CHANGE_ME

  # -------------------------------------------------------------------------
  # Redis
  # -------------------------------------------------------------------------
  REDIS_PASSWORD: Q0hBTkdFX01F                       # CHANGE_ME

  # -------------------------------------------------------------------------
  # Elasticsearch
  # -------------------------------------------------------------------------
  ELASTICSEARCH_USERNAME: Q0hBTkdFX01F               # CHANGE_ME
  ELASTICSEARCH_PASSWORD: Q0hBTkdFX01F               # CHANGE_ME

  # -------------------------------------------------------------------------
  # Kafka
  # -------------------------------------------------------------------------
  KAFKA_SASL_USERNAME: Q0hBTkdFX01F                  # CHANGE_ME
  KAFKA_SASL_PASSWORD: Q0hBTkdFX01F                  # CHANGE_ME

  # -------------------------------------------------------------------------
  # JWT / Auth
  # -------------------------------------------------------------------------
  JWT_SECRET: Q0hBTkdFX01F                           # CHANGE_ME
  JWT_REFRESH_SECRET: Q0hBTkdFX01F                   # CHANGE_ME

  # -------------------------------------------------------------------------
  # Payment Provider
  # -------------------------------------------------------------------------
  PAYMENT_API_KEY: Q0hBTkdFX01F                      # CHANGE_ME
  PAYMENT_SECRET_KEY: Q0hBTkdFX01F                   # CHANGE_ME

  # -------------------------------------------------------------------------
  # Blockchain / Web3
  # -------------------------------------------------------------------------
  BLOCKCHAIN_PRIVATE_KEY: Q0hBTkdFX01F               # CHANGE_ME

  # -------------------------------------------------------------------------
  # Email / Notification
  # -------------------------------------------------------------------------
  SMTP_PASSWORD: Q0hBTkdFX01F                        # CHANGE_ME
  FIREBASE_SERVICE_ACCOUNT_KEY: Q0hBTkdFX01F         # CHANGE_ME

  # -------------------------------------------------------------------------
  # Object Storage (S3 / MinIO)
  # -------------------------------------------------------------------------
  S3_ACCESS_KEY_ID: Q0hBTkdFX01F                     # CHANGE_ME
  S3_SECRET_ACCESS_KEY: Q0hBTkdFX01F                 # CHANGE_ME
