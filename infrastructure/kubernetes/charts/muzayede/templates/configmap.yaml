{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}-config
  namespace: {{ $.Values.global.namespace }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
    app.kubernetes.io/part-of: muzayede
data:
  ENVIRONMENT: {{ $.Values.global.environment | quote }}
  SERVICE_NAME: {{ $name | quote }}
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"

  # Service Discovery
  API_GATEWAY_URL: "http://api-gateway:3000"
  AUTH_SERVICE_URL: "http://auth-service:3001"
  USER_SERVICE_URL: "http://user-service:3002"
  AUCTION_SERVICE_URL: "http://auction-service:3003"
  BID_SERVICE_URL: "http://bid-service:3004"
  PAYMENT_SERVICE_URL: "http://payment-service:3005"
  NOTIFICATION_SERVICE_URL: "http://notification-service:3006"
  SEARCH_SERVICE_URL: "http://search-service:3007"
  MEDIA_SERVICE_URL: "http://media-service:3008"
  CATEGORY_SERVICE_URL: "http://category-service:3009"
  ANALYTICS_SERVICE_URL: "http://analytics-service:3010"
  WEBSOCKET_SERVICE_URL: "http://websocket-service:3011"
  ADMIN_SERVICE_URL: "http://admin-service:3012"
  SCHEDULER_SERVICE_URL: "http://scheduler-service:3013"

  # Observability
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  OTEL_SERVICE_NAME: {{ $name | quote }}
  METRICS_ENABLED: "true"
  TRACING_ENABLED: "true"
{{- end }}
{{- end }}
