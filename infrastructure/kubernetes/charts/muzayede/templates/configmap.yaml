{{/*
Shared ConfigMap - environment variables available to every service.
Individual services also receive NODE_ENV and PORT via the deployment env block.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: muzayede-shared-config
  namespace: {{ include "muzayede.namespace" . }}
  labels:
    {{- include "muzayede.labels" (dict "name" "shared-config" "context" $) | nindent 4 }}
data:
  # -------------------------------------------------------------------------
  # General
  # -------------------------------------------------------------------------
  ENVIRONMENT: {{ .Values.global.environment | quote }}
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"

  # -------------------------------------------------------------------------
  # Infrastructure Endpoints
  # -------------------------------------------------------------------------
  DATABASE_HOST: {{ .Values.infrastructure.postgresql.host | quote }}
  DATABASE_PORT: {{ .Values.infrastructure.postgresql.port | quote }}
  DATABASE_NAME: {{ .Values.infrastructure.postgresql.database | quote }}

  REDIS_HOST: {{ .Values.infrastructure.redis.host | quote }}
  REDIS_PORT: {{ .Values.infrastructure.redis.port | quote }}

  ELASTICSEARCH_NODE: "http://{{ .Values.infrastructure.elasticsearch.host }}:{{ .Values.infrastructure.elasticsearch.port }}"

  KAFKA_BROKERS: {{ .Values.infrastructure.kafka.brokers | quote }}

  # -------------------------------------------------------------------------
  # Service Discovery (internal ClusterIP DNS names)
  # -------------------------------------------------------------------------
  API_GATEWAY_URL: "http://api-gateway:{{ (index .Values.services "api-gateway").service.port }}"
  AUTH_SERVICE_URL: "http://auth-service:{{ (index .Values.services "auth-service").service.port }}"
  USER_SERVICE_URL: "http://user-service:{{ (index .Values.services "user-service").service.port }}"
  AUCTION_SERVICE_URL: "http://auction-service:{{ (index .Values.services "auction-service").service.port }}"
  BID_SERVICE_URL: "http://bid-service:{{ (index .Values.services "bid-service").service.port }}"
  PRODUCT_SERVICE_URL: "http://product-service:{{ (index .Values.services "product-service").service.port }}"
  NOTIFICATION_SERVICE_URL: "http://notification-service:{{ (index .Values.services "notification-service").service.port }}"
  SEARCH_SERVICE_URL: "http://search-service:{{ (index .Values.services "search-service").service.port }}"
  PAYMENT_SERVICE_URL: "http://payment-service:{{ (index .Values.services "payment-service").service.port }}"
  SHIPPING_SERVICE_URL: "http://shipping-service:{{ (index .Values.services "shipping-service").service.port }}"
  LIVE_SERVICE_URL: "http://live-service:{{ (index .Values.services "live-service").service.port }}"
  BLOCKCHAIN_SERVICE_URL: "http://blockchain-service:{{ (index .Values.services "blockchain-service").service.port }}"
  ANALYTICS_SERVICE_URL: "http://analytics-service:{{ (index .Values.services "analytics-service").service.port }}"
  CMS_SERVICE_URL: "http://cms-service:{{ (index .Values.services "cms-service").service.port }}"

  # -------------------------------------------------------------------------
  # Observability
  # -------------------------------------------------------------------------
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.monitoring:4317"
  METRICS_ENABLED: "true"
  TRACING_ENABLED: "true"
