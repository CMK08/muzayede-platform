{{- if .Values.global.tls.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "muzayede.fullname" . }}-ingress
  namespace: {{ include "muzayede.namespace" . }}
  labels:
    {{- include "muzayede.labels" (dict "name" "ingress" "context" $) | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://{{ .Values.global.domain }}"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization"
    nginx.ingress.kubernetes.io/limit-rps: "100"
    cert-manager.io/cluster-issuer: {{ .Values.global.tls.clusterIssuer }}
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Permissions-Policy: camera=(), microphone=(), geolocation=()";
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains; preload";
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - {{ .Values.global.domain }}
        - api.{{ .Values.global.domain }}
        - ws.{{ .Values.global.domain }}
      secretName: {{ include "muzayede.fullname" . }}-tls
  rules:
    # -----------------------------------------------------------------------
    # Primary domain - routes defined per-service in values.yaml
    # -----------------------------------------------------------------------
    - host: {{ .Values.global.domain }}
      http:
        paths:
          {{- range $name, $svc := .Values.services }}
          {{- if and $svc.enabled (and $svc.ingress $svc.ingress.enabled) }}
          - path: {{ $svc.ingress.path }}
            pathType: {{ $svc.ingress.pathType }}
            backend:
              service:
                name: {{ $name }}
                port:
                  number: {{ $svc.service.port }}
          {{- end }}
          {{- end }}
    # -----------------------------------------------------------------------
    # api.muzayede.com -> api-gateway
    # -----------------------------------------------------------------------
    - host: api.{{ .Values.global.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: {{ (index .Values.services "api-gateway").service.port }}
    # -----------------------------------------------------------------------
    # ws.muzayede.com -> live-service (WebSocket)
    # -----------------------------------------------------------------------
    - host: ws.{{ .Values.global.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: live-service
                port:
                  number: {{ (index .Values.services "live-service").service.port }}
---
# -------------------------------------------------------------------------
# Separate Ingress for WebSocket upgrades (different timeout settings)
# -------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "muzayede.fullname" . }}-ws-ingress
  namespace: {{ include "muzayede.namespace" . }}
  labels:
    {{- include "muzayede.labels" (dict "name" "ws-ingress" "context" $) | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/websocket-services: "live-service"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"
    cert-manager.io/cluster-issuer: {{ .Values.global.tls.clusterIssuer }}
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ws.{{ .Values.global.domain }}
      secretName: {{ include "muzayede.fullname" . }}-ws-tls
  rules:
    - host: ws.{{ .Values.global.domain }}
      http:
        paths:
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: live-service
                port:
                  number: {{ (index .Values.services "live-service").service.port }}
{{- end }}
