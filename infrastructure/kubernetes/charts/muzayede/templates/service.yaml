{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ include "muzayede.namespace" $ }}
  labels:
    {{- include "muzayede.labels" (dict "name" $name "context" $) | nindent 4 }}
spec:
  type: {{ $svc.service.type }}
  ports:
    - port: {{ $svc.service.port }}
      targetPort: {{ $svc.service.targetPort | default $svc.containerPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "muzayede.selectorLabels" (dict "name" $name "context" $) | nindent 4 }}
{{- end }}
{{- end }}
