###############################################################################
# Muzayede Platform - Helm Values (production defaults)
###############################################################################

# ---------------------------------------------------------------------------
# Global Settings
# ---------------------------------------------------------------------------
global:
  imageRegistry: ""                       # e.g. 123456789012.dkr.ecr.eu-central-1.amazonaws.com
  imageTag: "latest"                      # default tag for all services; overridable per-service
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []                    # e.g. [{ name: regcred }]

  environment: production
  namespace: muzayede
  domain: muzayede.com

  tls:
    enabled: true
    clusterIssuer: letsencrypt-prod

# ---------------------------------------------------------------------------
# Shared Infrastructure Endpoints (injected via ConfigMap)
# ---------------------------------------------------------------------------
infrastructure:
  postgresql:
    host: muzayede-postgresql
    port: 5432
    database: muzayede
  redis:
    host: muzayede-redis-master
    port: 6379
  elasticsearch:
    host: muzayede-elasticsearch
    port: 9200
  kafka:
    brokers: muzayede-kafka-headless:9092

# ---------------------------------------------------------------------------
# Service Definitions
# ---------------------------------------------------------------------------
services:

  # -------------------------------------------------------------------------
  # API Gateway (NestJS) - external entry point
  # -------------------------------------------------------------------------
  api-gateway:
    enabled: true
    replicaCount: 3
    image:
      repository: muzayede/api-gateway
      tag: ""                             # falls back to global.imageTag
    containerPort: 4000
    service:
      type: ClusterIP
      port: 3000
      targetPort: 4000
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    autoscaling:
      enabled: true
      minReplicas: 3
      maxReplicas: 12
      targetCPU: 70
      targetMemory: 80
    env:
      - name: PORT
        value: "4000"
    healthCheck:
      path: /health
      port: 4000
    ingress:
      enabled: true
      path: /api
      pathType: Prefix
    pdb:
      enabled: true
      minAvailable: 2

  # -------------------------------------------------------------------------
  # Auth Service (NestJS)
  # -------------------------------------------------------------------------
  auth-service:
    enabled: true
    replicaCount: 2
    image:
      repository: muzayede/auth-service
      tag: ""
    containerPort: 3001
    service:
      type: ClusterIP
      port: 3001
      targetPort: 3001
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 6
      targetCPU: 70
      targetMemory: 80
    env:
      - name: PORT
        value: "3001"
    healthCheck:
      path: /health
      port: 3001
    ingress:
      enabled: false
    pdb:
      enabled: true
      minAvailable: 1

  # -------------------------------------------------------------------------
