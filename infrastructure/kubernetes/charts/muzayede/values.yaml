###############################################################################
# Muzayede Platform — Helm Values (defaults)
###############################################################################

global:
  environment: production
  imagePullPolicy: IfNotPresent
  imageRegistry: ""  # e.g., 123456789012.dkr.ecr.eu-central-1.amazonaws.com
  namespace: muzayede
  domain: muzayede.com
  tls:
    enabled: true
    clusterIssuer: letsencrypt-prod

# ---------------------------------------------------------------------------
# Service Definitions (15 services)
# ---------------------------------------------------------------------------
services:
  # --- API Gateway ---
  api-gateway:
    enabled: true
    replicaCount: 2
    image:
      repository: muzayede/api-gateway
      tag: latest
    containerPort: 3000
    service:
      type: ClusterIP
      port: 3000
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPU: 70
      targetMemory: 80
    env:
      - name: NODE_ENV
        value: production
      - name: PORT
        value: "3000"
    healthCheck:
      path: /health
      port: 3000
    ingress:
      enabled: true
      path: /api
      pathType: Prefix

  # --- Auth Service ---
  auth-service:
    enabled: true
    replicaCount: 2
    image:
