###############################################################################
# Deploy to Production — On push to main branch
###############################################################################

name: Deploy Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: eu-central-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-central-1.amazonaws.com
  EKS_CLUSTER: muzayede-production
  HELM_RELEASE: muzayede-production
  NAMESPACE: muzayede-production
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

permissions:
  id-token: write
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Build & Push Docker Images
  # ---------------------------------------------------------------------------
  build-push:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - auction-service
          - bid-service
          - product-service
          - notification-service
          - search-service
          - payment-service
          - shipping-service
          - live-service
          - ai-service
          - blockchain-service
          - analytics-service
          - cms-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/muzayede/${{ matrix.service }}
          tags: |
            type=sha,prefix=prod-
            type=semver,pattern={{version}},value=${{ github.ref_name }}
            type=raw,value=prod-latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production
            BUILD_SHA=${{ github.sha }}

  # ---------------------------------------------------------------------------
  # Build & Push Web Frontend
  # ---------------------------------------------------------------------------
  build-push-web:
    name: Build & Push Web Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/muzayede/web
          tags: |
            type=sha,prefix=prod-
            type=semver,pattern={{version}},value=${{ github.ref_name }}
            type=raw,value=prod-latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.muzayede.com/api/v1
            NEXT_PUBLIC_SOCKET_URL=wss://ws.muzayede.com

  # ---------------------------------------------------------------------------
  # Deploy to EKS Production (requires approval)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to EKS Production
    runs-on: ubuntu-latest
    needs: [build-push, build-push-web]
    environment:
      name: production
      url: https://muzayede.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER }} \
            --region ${{ env.AWS_REGION }}

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Create namespace if not exists
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy with Helm (canary — 10%)
        run: |
          IMAGE_TAG="prod-$(echo ${{ github.sha }} | cut -c1-7)"

          helm upgrade --install ${{ env.HELM_RELEASE }} \
            infrastructure/kubernetes/charts/muzayede \
            --namespace ${{ env.NAMESPACE }} \
            --set global.environment=production \
            --set global.imageRegistry=${{ env.ECR_REGISTRY }} \
            --set global.domain=muzayede.com \
            --set global.tls.clusterIssuer=letsencrypt-prod \
            --set "services.api-gateway.image.tag=${IMAGE_TAG}" \
            --set "services.auth-service.image.tag=${IMAGE_TAG}" \
            --set "services.user-service.image.tag=${IMAGE_TAG}" \
            --set "services.auction-service.image.tag=${IMAGE_TAG}" \
            --set "services.bid-service.image.tag=${IMAGE_TAG}" \
            --set "services.product-service.image.tag=${IMAGE_TAG}" \
            --set "services.notification-service.image.tag=${IMAGE_TAG}" \
            --set "services.search-service.image.tag=${IMAGE_TAG}" \
            --set "services.payment-service.image.tag=${IMAGE_TAG}" \
            --set "services.shipping-service.image.tag=${IMAGE_TAG}" \
            --set "services.live-service.image.tag=${IMAGE_TAG}" \
            --set "services.ai-service.image.tag=${IMAGE_TAG}" \
            --set "services.blockchain-service.image.tag=${IMAGE_TAG}" \
            --set "services.analytics-service.image.tag=${IMAGE_TAG}" \
            --set "services.cms-service.image.tag=${IMAGE_TAG}" \
            --set "services.web-frontend.image.tag=${IMAGE_TAG}" \
            --wait \
            --timeout 15m

      - name: Verify deployment
        run: |
          echo "Verifying all deployments are healthy..."
          DEPLOYMENTS=$(kubectl get deployments -n ${{ env.NAMESPACE }} -o name)
          for DEPLOY in $DEPLOYMENTS; do
            echo "Checking ${DEPLOY}..."
            kubectl rollout status ${DEPLOY} -n ${{ env.NAMESPACE }} --timeout=5m
          done
          echo "All deployments are healthy."

      - name: Run production smoke tests
        run: |
          echo "Running production smoke tests..."
          ENDPOINTS=(
            "https://muzayede.com"
            "https://api.muzayede.com/health"
          )
          for URL in "${ENDPOINTS[@]}"; do
            for i in $(seq 1 10); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "${URL} — OK (200)"
                break
              fi
              if [ "$i" = "10" ]; then
                echo "FAILED: ${URL} returned ${STATUS} after 10 attempts"
                exit 1
              fi
              echo "Attempt $i for ${URL}: status ${STATUS}, retrying in 10s..."
              sleep 10
            done
          done
          echo "All smoke tests passed."

      - name: Tag release
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          git tag -a "deploy-prod-${SHORT_SHA}" -m "Production deployment ${SHORT_SHA}"
          git push origin "deploy-prod-${SHORT_SHA}"

  # ---------------------------------------------------------------------------
  # Rollback (manual trigger)
  # ---------------------------------------------------------------------------
  rollback:
    name: Rollback Production
    runs-on: ubuntu-latest
    needs: [deploy]
    if: failure()
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER }} \
            --region ${{ env.AWS_REGION }}

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Rollback Helm release
        run: |
          echo "Deployment failed. Rolling back to previous release..."
          helm rollback ${{ env.HELM_RELEASE }} \
            --namespace ${{ env.NAMESPACE }} \
            --wait \
            --timeout 10m
          echo "Rollback completed."

  # ---------------------------------------------------------------------------
  # Notify
  # ---------------------------------------------------------------------------
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    steps:
      - name: Send Slack notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ needs.deploy.result }}
          fields: repo,commit,author,action,workflow
          mention: channel
          if_mention: failure,cancelled
          text: |
            Production deployment ${{ needs.deploy.result == 'success' && 'succeeded' || 'FAILED' }}!
            Commit: ${{ github.sha }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: env.SLACK_WEBHOOK_URL != ''
