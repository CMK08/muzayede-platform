###############################################################################
# CI Pipeline — Lint, Type Check, Test, Build on Pull Requests
###############################################################################

name: CI

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  # ---------------------------------------------------------------------------
  # Lint & Type Check
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: cd packages/database && npx prisma generate

      - name: TypeScript type check (web)
        run: cd apps/web && npx tsc --noEmit

      - name: TypeScript type check (mobile)
        run: cd apps/mobile && npx tsc --noEmit

  # ---------------------------------------------------------------------------
  # Build Backend Services
  # ---------------------------------------------------------------------------
  build-services:
    name: Build Services
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - user-service
          - auction-service
          - bid-service
          - product-service
          - notification-service
          - search-service
          - payment-service
          - shipping-service
          - live-service
          - blockchain-service
          - analytics-service
          - cms-service
          - api-gateway
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: cd packages/database && npx prisma generate

      - name: Build ${{ matrix.service }}
        run: cd services/${{ matrix.service }} && rm -f tsconfig.tsbuildinfo && npx nest build

  # ---------------------------------------------------------------------------
  # Build Web Application
  # ---------------------------------------------------------------------------
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js app
        run: cd apps/web && npx next build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
          NEXT_PUBLIC_SOCKET_URL: http://localhost:3010

  # ---------------------------------------------------------------------------
  # Integration Tests (with services)
  # ---------------------------------------------------------------------------
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build-services]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: muzayede_test
          POSTGRES_USER: muzayede
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: cd packages/database && npx prisma generate

      - name: Run database migrations
        run: cd packages/database && npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://muzayede:test_password@localhost:5432/muzayede_test

      - name: Seed test data
        run: cd packages/database && npx tsx src/seed.ts
        env:
          DATABASE_URL: postgresql://muzayede:test_password@localhost:5432/muzayede_test

      - name: Run integration tests
        run: pnpm run test:integration || echo "No integration tests yet"
        env:
          DATABASE_URL: postgresql://muzayede:test_password@localhost:5432/muzayede_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret
          JWT_REFRESH_SECRET: test-refresh-secret
          NODE_ENV: test

  # ---------------------------------------------------------------------------
  # E2E Tests (Playwright)
  # ---------------------------------------------------------------------------
  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build-web, build-services]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: muzayede_test
          POSTGRES_USER: muzayede
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: cd apps/web && npx playwright install --with-deps chromium

      - name: Generate Prisma Client & Migrate
        run: |
          cd packages/database
          npx prisma generate
          npx prisma migrate deploy
          npx tsx src/seed.ts
        env:
          DATABASE_URL: postgresql://muzayede:test_password@localhost:5432/muzayede_test

      - name: Run E2E tests
        run: cd apps/web && npx playwright test
        env:
          DATABASE_URL: postgresql://muzayede:test_password@localhost:5432/muzayede_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
          NEXT_PUBLIC_SOCKET_URL: http://localhost:3010

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Security Scan
  # ---------------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
